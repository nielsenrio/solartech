{% extends "pages/base.html" %}

{% block title %}Home | SolarTech{% endblock %}

{% block content %}

<div class="container my-5">

  <!-- Mensagem do servidor -->
  <section class="mb-5" aria-labelledby="titulo-mensagem">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <header class="d-flex align-items-center mb-3">
          <i class="fa-solid fa-server fa-lg text-primary me-2"></i>
          <h2 id="titulo-mensagem" class="h5 mb-0 fw-semibold">
            Mensagem do servidor
          </h2>
        </header>

        <div class="bg-light rounded p-4 text-center">
          <p class="fs-4 fw-bold text-primary mb-0">
            {{ mensagem }}
          </p>
        </div>

      </div>
    </div>
  </section>

  <!-- Informações do aluno -->
  <section aria-labelledby="titulo-contato">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <header class="d-flex align-items-center mb-4">
          <i class="fa-solid fa-address-card fa-lg text-success me-2"></i>
          <h2 id="titulo-contato" class="h5 mb-0 fw-semibold">
            Informações do aluno
          </h2>
        </header>

        <div class="row g-4">

          <div class="col-md-6">
            <div class="border rounded p-3 bg-light h-100">
              <small class="text-muted d-block mb-1">
                Nome do aluno
              </small>
              <span class="fw-semibold">
                {{ nome_aluno }}
              </span>
            </div>
          </div>

          <div class="col-md-6">
            <div class="border rounded p-3 bg-light h-100">
              <small class="text-muted d-block mb-1">
                Curso
              </small>
              <span class="fw-semibold">
                {{ curso }}
              </span>
            </div>
          </div>

        </div>

      </div>
    </div>
  </section>

</div>

{% endblock %}
