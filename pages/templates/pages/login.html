{% extends "pages/base.html" %}

{% block title %}Login | SolarTech{% endblock %}

{% block content %}

<section class="container my-5 d-flex justify-content-center">

  <div class="card border-0 shadow-sm w-100" style="max-width: 420px;">

    <div class="card-body p-4">

      <!-- Cabeçalho -->
      <div class="text-center mb-4">
        <i class="fa-solid fa-user-lock fa-2x text-success mb-2"></i>
        <h1 class="h4 fw-semibold mb-0">Acesso ao sistema</h1>
      </div>

      <!-- Erro -->
      {% if erro %}
        <div class="alert alert-danger text-center">
          {{ erro }}
        </div>
      {% endif %}

      <!-- Formulário -->
      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold">Usuário</label>
          <input class="form-control" type="text" name="username" required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <input class="form-control" type="password" name="password" required>
        </div>

        <div class="d-grid">
          <button class="btn btn-success btn-lg" type="submit">
            <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>
            Entrar
          </button>
        </div>

      </form>

    </div>

  </div>

</section>

{% endblock %}
